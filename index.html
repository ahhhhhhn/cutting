<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="description" content="멜론을 정중앙에서 잘라보세요! 타이밍을 맞춰 자르기에 성공하면 됩니다.">
  <meta name="theme-color" content="#2d6e2d">
  <title>멜론 자르고 상금 받기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'Noto Sans KR', sans-serif;
      touch-action: none;
      background: #1a4d1a;
    }

    #game-root {
      width: 100%; height: 100%;
      max-width: 480px;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
    }

    /* ── SCREEN BASE ── */
    .screen {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .screen.hidden { display: none; }

    /* ══════════════════════════════
       INTRO SCREEN
    ══════════════════════════════ */
    #intro {
      background: linear-gradient(175deg, #b2dfb2 0%, #e8f5e9 55%, #c8e6c9 100%);
    }

    .intro-title {
      text-align: center;
      margin-bottom: 10px;
    }
    .intro-title .t1 {
      font-size: clamp(52px, 14vw, 64px);
      font-weight: 900;
      color: #2d7a2d;
      text-shadow: 0 4px 0 #1a4d1a, 0 6px 10px rgba(0,0,0,.28);
      -webkit-text-stroke: 2px #1a4d1a;
      display: block;
      line-height: 1;
    }
    .intro-title .t2 {
      font-size: clamp(36px, 10vw, 48px);
      font-weight: 900;
      color: #fff;
      text-shadow: 0 3px 0 #c2185b, 0 5px 10px rgba(0,0,0,.28);
      -webkit-text-stroke: 1.5px #c2185b;
      display: block;
      line-height: 1.15;
    }

    .intro-char {
      width: clamp(130px, 38vw, 170px);
      margin: 6px 0 18px;
      filter: drop-shadow(0 8px 16px rgba(0,0,0,.22));
    }

    .btn-start {
      background: #2d6e2d;
      color: #fff;
      border: none;
      border-radius: 50px;
      font-size: clamp(18px, 5vw, 22px);
      font-weight: 800;
      padding: 14px 64px;
      cursor: pointer;
      box-shadow: 0 5px 20px rgba(45,110,45,.55);
      letter-spacing: 1px;
      -webkit-tap-highlight-color: transparent;
      transition: transform .12s, box-shadow .12s;
    }
    .btn-start:active { transform: scale(.96); box-shadow: 0 2px 10px rgba(45,110,45,.4); }

    /* ══════════════════════════════
       GAME SCREEN
    ══════════════════════════════ */
    #game {
      background: linear-gradient(160deg, #ffe8b0 0%, #ffd580 45%, #ffb347 100%);
      justify-content: flex-start;
    }

    .game-header {
      width: 100%;
      padding: 12px 16px 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,.28);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      flex-shrink: 0;
    }
    .game-header-title {
      font-size: 14px;
      font-weight: 700;
      color: #7b3000;
      flex: 1;
    }
    .progress-wrap {
      width: 160px; height: 10px;
      background: rgba(255,255,255,.5);
      border-radius: 10px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: #e91e8c;
      border-radius: 10px;
      transition: width .1s linear;
    }
    .count-badge {
      font-size: 14px;
      font-weight: 700;
      color: #7b3000;
      min-width: 22px;
      text-align: right;
    }

    /* Stage */
    .game-stage {
      flex: 1;
      width: 100%;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Center guide line */
    #center-guide {
      position: absolute;
      top: 0; bottom: 0;
      width: 2px;
      background: rgba(255,255,255,.35);
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
      z-index: 2;
    }
    .guide-dot {
      position: absolute;
      left: 50%; top: 50%;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: rgba(255,255,255,.9);
      border: 2.5px solid #e91e8c;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 3;
    }

    /* Melon */
    #melon-wrap {
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 2;
    }
    .melon-svg {
      width: clamp(170px, 50vw, 210px);
      height: clamp(170px, 50vw, 210px);
    }

    /* Blade */
    #blade {
      position: absolute;
      top: 0; bottom: 0;
      width: 6px;
      background: repeating-linear-gradient(
        #fff 0px, #fff 14px,
        transparent 14px, transparent 22px
      );
      border-radius: 3px;
      box-shadow: 0 0 0 2px #e91e8c;
      transform: translateX(-50%);
      will-change: left;
      z-index: 5;
      pointer-events: none;
      transition: box-shadow .08s;
    }
    #blade.hit-zone {
      box-shadow: 0 0 0 3px #fff, 0 0 0 5px #e91e8c;
    }

    /* Tooltip bubbles */
    .tooltip-bubble {
      position: absolute;
      background: #fff;
      border-radius: 16px;
      padding: 8px 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,.14);
      pointer-events: none;
      z-index: 20;
      white-space: nowrap;
      transition: opacity .4s;
    }
    .tooltip-bubble .big {
      font-size: 16px;
      font-weight: 900;
      color: #e91e8c;
      display: block;
    }
    .tooltip-bubble .small {
      font-size: 11px;
      color: #666;
    }
    #tip-right { top: 20%; right: 8%; }
    #tip-left  { top: 58%; left: 4%; }

    /* Cut button */
    #btn-cut {
      width: calc(100% - 32px);
      margin: 0 16px 16px;
      flex-shrink: 0;
      background: #2d6e2d;
      color: #fff;
      font-size: clamp(20px, 5.5vw, 24px);
      font-weight: 800;
      border: none;
      border-radius: 50px;
      padding: 14px 0;
      cursor: pointer;
      box-shadow: 0 5px 20px rgba(45,110,45,.5);
      letter-spacing: 2px;
      -webkit-tap-highlight-color: transparent;
      transition: transform .1s, box-shadow .1s;
    }
    #btn-cut:active {
      transform: scale(.97);
      box-shadow: 0 2px 10px rgba(45,110,45,.4);
    }

    /* ══════════════════════════════
       RESULT POPUP
    ══════════════════════════════ */
    #popup-overlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,.55);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s;
    }
    #popup-overlay.show {
      opacity: 1;
      pointer-events: all;
    }
    .popup-card {
      background: #fff;
      border-radius: 24px;
      padding: 32px 24px 24px;
      width: 82%;
      max-width: 300px;
      text-align: center;
      transform: scale(.82);
      transition: transform .25s cubic-bezier(.34,1.5,.64,1);
    }
    #popup-overlay.show .popup-card {
      transform: scale(1);
    }
    .popup-emoji { font-size: 60px; margin-bottom: 10px; }
    .popup-title {
      font-size: 26px;
      font-weight: 900;
      margin-bottom: 10px;
    }
    .popup-title.success { color: #2d7a2d; }
    .popup-title.fail    { color: #c0392b; }
    .popup-desc {
      font-size: 14px;
      color: #555;
      line-height: 1.6;
      margin-bottom: 24px;
      white-space: pre-line;
    }
    .popup-btns {
      display: flex;
      gap: 10px;
    }
    .popup-btn {
      flex: 1;
      padding: 12px 0;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: transform .1s;
    }
    .popup-btn:active { transform: scale(.96); }
    .popup-btn.primary   { background: #2d6e2d; color: #fff; }
    .popup-btn.secondary { background: #f0f0f0; color: #444; }
  </style>
</head>
<body>
<div id="game-root">

  <!-- ── INTRO ── -->
  <div class="screen" id="intro">
    <div class="intro-title">
      <span class="t1">멜론</span>
      <span class="t2">자르고<br>상금받기</span>
    </div>

    <!-- Character SVG -->
    <svg class="intro-char" viewBox="0 0 140 160" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <!-- floatie -->
      <ellipse cx="70" cy="149" rx="52" ry="13" fill="#f48fb1" opacity=".9"/>
      <ellipse cx="70" cy="145" rx="48" ry="11" fill="none" stroke="#fff" stroke-width="5" stroke-dasharray="12 8"/>
      <!-- body -->
      <circle cx="70" cy="100" r="32" fill="#ff8a65"/>
      <!-- shorts -->
      <rect x="50" y="118" width="40" height="22" rx="8" fill="#1565c0"/>
      <!-- arms -->
      <ellipse cx="34" cy="108" rx="9" ry="5" fill="#ff8a65" transform="rotate(-20 34 108)"/>
      <ellipse cx="106" cy="108" rx="9" ry="5" fill="#ff8a65" transform="rotate(20 106 108)"/>
      <!-- head -->
      <circle cx="70" cy="70" r="26" fill="#ffccbc"/>
      <!-- visor -->
      <rect x="46" y="55" width="48" height="16" rx="8" fill="#fff"/>
      <rect x="44" y="60" width="52" height="8" rx="4" fill="#e0e0e0"/>
      <!-- eyes -->
      <path d="M60 76 Q63 72 66 76" stroke="#5d4037" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M74 76 Q77 72 80 76" stroke="#5d4037" stroke-width="2" fill="none" stroke-linecap="round"/>
      <!-- smile -->
      <path d="M63 83 Q70 89 77 83" stroke="#5d4037" stroke-width="2" fill="none" stroke-linecap="round"/>
      <!-- melon slice -->
      <path d="M42 125 L70 108 L98 125 Z" fill="#a5d6a7"/>
      <path d="M44 126 L70 110 L96 126" stroke="#1b5e20" stroke-width="1.5" fill="none"/>
      <circle cx="56" cy="120" r="3" fill="#1b5e20"/>
      <circle cx="70" cy="116" r="3" fill="#1b5e20"/>
      <circle cx="83" cy="120" r="3" fill="#1b5e20"/>
    </svg>

    <button class="btn-start" id="btn-intro-start">게임 시작하기</button>
  </div>

  <!-- ── GAME ── -->
  <div class="screen hidden" id="game">
    <div class="game-header">
      <span class="game-header-title">🍈 멜론 자르고 상금 받기</span>
      <div class="progress-wrap">
        <div class="progress-fill" id="pb"></div>
      </div>
      <span class="count-badge" id="count-text">10</span>
    </div>

    <div class="game-stage" id="stage">
      <div id="center-guide"></div>
      <div class="guide-dot"></div>

      <!-- Melon -->
      <div id="melon-wrap">
        <svg class="melon-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <defs>
            <radialGradient id="mg" cx="40%" cy="35%">
              <stop offset="0%"   stop-color="#d4edaa"/>
              <stop offset="70%"  stop-color="#8bc34a"/>
              <stop offset="100%" stop-color="#558b2f"/>
            </radialGradient>
            <clipPath id="melon-clip">
              <circle cx="100" cy="108" r="80"/>
            </clipPath>
          </defs>
          <circle cx="100" cy="108" r="80" fill="url(#mg)"/>
          <g clip-path="url(#melon-clip)" opacity=".55" stroke="#6a9e2a" stroke-width="1.2" fill="none">
            <path d="M30 60 Q100 40 170 60 Q185 108 170 156 Q100 176 30 156 Q15 108 30 60Z"/>
            <line x1="100" y1="28" x2="100" y2="188"/>
            <line x1="20"  y1="108" x2="180" y2="108"/>
            <path d="M100 28 Q135 68 130 108 Q135 148 100 188"/>
            <path d="M100 28 Q65  68 70  108 Q65  148 100 188"/>
            <path d="M48  42  Q108 70  152 42"/>
            <path d="M38  74  Q100 98  162 74"/>
            <path d="M33  140 Q100 118 167 140"/>
            <path d="M46  170 Q100 148 154 170"/>
          </g>
          <path d="M95 28 Q100 10 108 22" stroke="#4caf50" stroke-width="4" fill="none" stroke-linecap="round"/>
          <ellipse cx="100" cy="28" rx="6" ry="5" fill="#4caf50"/>
          <ellipse cx="75" cy="72" rx="16" ry="10" fill="rgba(255,255,255,.22)" transform="rotate(-20 75 72)"/>
        </svg>
      </div>

      <!-- Blade -->
      <div id="blade" role="presentation"></div>

      <!-- Tooltip hints -->
      <div class="tooltip-bubble" id="tip-right">
        <span class="big">바로 여기!</span>
        <span class="small">겹쳐지는 순간을 노려요!</span>
      </div>
      <div class="tooltip-bubble" id="tip-left">
        <span class="big">좌우로 이동</span>
        <span class="small">가운데를 맞춰보세요!</span>
      </div>
    </div>

    <button id="btn-cut">자르기</button>
  </div>

  <!-- ── RESULT POPUP ── -->
  <div id="popup-overlay" role="dialog" aria-modal="true" aria-labelledby="pop-title">
    <div class="popup-card">
      <div class="popup-emoji" id="pop-emoji" aria-hidden="true"></div>
      <div class="popup-title" id="pop-title"></div>
      <p class="popup-desc" id="pop-desc"></p>
      <div class="popup-btns">
        <button class="popup-btn secondary" id="pop-back">처음으로</button>
        <button class="popup-btn primary"   id="pop-retry">다시 하기</button>
      </div>
    </div>
  </div>

</div><!-- #game-root -->

<script>
  'use strict';

  const $ = id => document.getElementById(id);

  const introScreen = $('intro');
  const gameScreen  = $('game');
  const blade       = $('blade');
  const pb          = $('pb');
  const countText   = $('count-text');
  const overlay     = $('popup-overlay');
  const tipRight    = $('tip-right');
  const tipLeft     = $('tip-left');

  const TOTAL_TIME  = 10000;  // ms
  const TICK        = 80;     // ms
  const HIT_RANGE   = 7.5;    // % from center
  const CENTER      = 50;     // %
  const BLADE_MIN   = 8;
  const BLADE_MAX   = 92;

  let bladeX     = BLADE_MIN;
  let dir        = 1;
  let speed      = 0.5;
  let raf        = null;
  let timer      = null;
  let elapsed    = 0;
  let gameActive = false;
  let tipsHidden = false;

  /* ─── Screens ─── */
  function showScreen(el) {
    [introScreen, gameScreen].forEach(s => s.classList.add('hidden'));
    el.classList.remove('hidden');
  }

  /* ─── Game start ─── */
  function startGame() {
    showScreen(gameScreen);

    bladeX     = BLADE_MIN;
    dir        = 1;
    speed      = 0.42 + Math.random() * 0.28;
    elapsed    = 0;
    gameActive = true;
    tipsHidden = false;

    tipRight.style.opacity = '1';
    tipLeft.style.opacity  = '1';

    pb.style.width    = '100%';
    countText.textContent = Math.ceil(TOTAL_TIME / 1000);

    blade.style.left = bladeX + '%';
    blade.classList.remove('hit-zone');

    startProgress();
    if (raf) cancelAnimationFrame(raf);
    raf = requestAnimationFrame(animBlade);
  }

  /* ─── Blade animation ─── */
  function animBlade() {
    if (!gameActive) return;

    bladeX += dir * speed;
    if (bladeX >= BLADE_MAX) { bladeX = BLADE_MAX; dir = -1; }
    if (bladeX <= BLADE_MIN) { bladeX = BLADE_MIN; dir =  1; }

    blade.style.left = bladeX + '%';
    blade.classList.toggle('hit-zone', Math.abs(bladeX - CENTER) <= HIT_RANGE);

    if (!tipsHidden && elapsed > 2500) {
      tipRight.style.opacity = '0';
      tipLeft.style.opacity  = '0';
      tipsHidden = true;
    }

    raf = requestAnimationFrame(animBlade);
  }

  /* ─── Progress timer ─── */
  function startProgress() {
    clearInterval(timer);
    timer = setInterval(() => {
      elapsed += TICK;
      const left = Math.max(0, TOTAL_TIME - elapsed);
      pb.style.width = ((left / TOTAL_TIME) * 100) + '%';
      countText.textContent = Math.ceil(left / 1000);

      /* speed ramp in final 4 seconds */
      if (TOTAL_TIME - elapsed <= 4000) {
        speed = Math.min(speed + 0.025, 1.3);
      }

      if (elapsed >= TOTAL_TIME) {
        clearInterval(timer);
        endGame(false, 'timeout');
      }
    }, TICK);
  }

  /* ─── End game ─── */
  function endGame(success, reason) {
    gameActive = false;
    cancelAnimationFrame(raf);
    raf = null;
    clearInterval(timer);

    const dist = Math.abs(bladeX - CENTER);

    if (success) {
      let grade, desc;
      if (dist <= 2)        { grade = '🏆 퍼펙트컷!';  desc = '정중앙에 정확히 맞췄어요!\n최고의 솜씨예요!'; }
      else if (dist <= 4)   { grade = '🎉 훌륭해요!';   desc = '거의 중앙이에요!\n아주 잘 잘랐어요.'; }
      else                  { grade = '😅 아슬아슬!';   desc = '가까스로 성공했어요.\n조금만 더 연습해봐요!'; }

      $('pop-emoji').textContent = dist <= 2 ? '🏆' : '🎉';
      $('pop-title').textContent = '성공!';
      $('pop-title').className   = 'popup-title success';
      $('pop-desc').textContent  = grade + '\n' + desc + '\n중앙에서 ' + dist.toFixed(1) + '% 차이';
    } else {
      if (reason === 'timeout') {
        $('pop-emoji').textContent = '⏰';
        $('pop-title').textContent = '시간 초과!';
        $('pop-title').className   = 'popup-title fail';
        $('pop-desc').textContent  = '10초 안에 자르지 못했어요.\n다시 도전해보세요!';
      } else {
        $('pop-emoji').textContent = '😢';
        $('pop-title').textContent = '실패!';
        $('pop-title').className   = 'popup-title fail';
        $('pop-desc').textContent  = '중앙에서 많이 벗어났어요.\n(차이: ' + dist.toFixed(1) + '%)\n정중앙을 노려보세요!';
      }
    }

    overlay.classList.add('show');
  }

  /* ─── Cut action ─── */
  function cut() {
    if (!gameActive) return;
    const dist = Math.abs(bladeX - CENTER);
    endGame(dist <= HIT_RANGE, 'cut');
  }

  /* ─── Event listeners ─── */
  function addBtn(id, fn) {
    const el = $(id);
    el.addEventListener('click', fn);
    el.addEventListener('touchend', e => { e.preventDefault(); fn(); });
  }

  addBtn('btn-intro-start', startGame);
  addBtn('btn-cut', cut);

  addBtn('pop-retry', () => {
    overlay.classList.remove('show');
    startGame();
  });
  addBtn('pop-back', () => {
    overlay.classList.remove('show');
    showScreen(introScreen);
  });

  /* Tap anywhere on the stage to cut */
  const stage = $('stage');
  stage.addEventListener('click',    cut);
  stage.addEventListener('touchend', e => { e.preventDefault(); cut(); });

  /* Keyboard support */
  document.addEventListener('keydown', e => {
    if (e.code === 'Space' || e.code === 'Enter') {
      e.preventDefault();
      if (gameActive) cut();
    }
  });
</script>
</body>
</html>
