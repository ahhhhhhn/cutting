<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="description" content="멜론을 정중앙에서 잘라보세요! 3단계를 모두 클리어하면 미션 완료!">
  <meta name="theme-color" content="#2d6e2d">
  <title>멜론 자르고 상금 받기</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
      touch-action: none; background: #111;
    }
    #game-root { width: 100%; height: 100%; max-width: 480px; margin: 0 auto; position: relative; overflow: hidden; }
    .screen { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .screen.hidden { display: none; }

    /* INTRO */
    #intro { background: radial-gradient(ellipse at 50% 30%, #c8f0c8 0%, #7ec87e 40%, #2d6e2d 100%); }
    .intro-deco { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
    .deco-melon { position: absolute; opacity: .11; }
    .deco-melon.tl { top: -40px; left: -40px; width: 180px; transform: rotate(-20deg); }
    .deco-melon.br { bottom: -40px; right: -40px; width: 160px; transform: rotate(140deg); }
    .deco-melon.tr { top: 60px; right: -30px; width: 100px; transform: rotate(30deg); }
    .intro-eyebrow { font-size: 13px; font-weight: 600; letter-spacing: 3px; color: rgba(255,255,255,.75); margin-bottom: 16px; }
    .intro-title { text-align: center; margin-bottom: 36px; position: relative; }
    .intro-title .melon-icon { font-size: clamp(52px,14vw,68px); display: block; line-height: 1; margin-bottom: 4px; }
    .intro-title .line1 { display: block; font-size: clamp(60px,18vw,80px); font-weight: 900; color: #fff; line-height: .95; letter-spacing: -2px; text-shadow: 0 4px 0 rgba(0,0,0,.18), 0 8px 24px rgba(0,0,0,.22); }
    .intro-title .line2 { display: block; font-size: clamp(24px,7vw,34px); font-weight: 700; color: #d4f7c0; letter-spacing: 1px; margin-top: 6px; text-shadow: 0 2px 8px rgba(0,0,0,.18); }
    .stage-pills { display: flex; gap: 8px; margin-bottom: 36px; }
    .stage-pill { padding: 6px 14px; border-radius: 50px; font-size: 12px; font-weight: 700; background: rgba(255,255,255,.18); color: #fff; border: 1.5px solid rgba(255,255,255,.3); letter-spacing: .5px; display: flex; align-items: center; gap: 5px; }
    .pill-num { display: inline-flex; align-items: center; justify-content: center; width: 16px; height: 16px; border-radius: 50%; background: rgba(255,255,255,.35); font-size: 10px; font-weight: 900; }
    .btn-start-wrap { position: relative; display: inline-block; }
    .btn-start {
      position: relative; display: flex; align-items: center; gap: 10px;
      background: linear-gradient(135deg, #38a838 0%, #2d6e2d 100%);
      color: #fff; border: none; border-radius: 52px; font-family: inherit;
      font-size: clamp(18px,5vw,22px); font-weight: 800; padding: 16px 44px 16px 36px;
      cursor: pointer; box-shadow: 0 6px 28px rgba(45,110,45,.55), 0 2px 0 rgba(255,255,255,.12) inset;
      letter-spacing: .5px; -webkit-tap-highlight-color: transparent;
      transition: transform .14s, box-shadow .14s;
    }
    .btn-start:active { transform: scale(.96) translateY(2px); box-shadow: 0 2px 12px rgba(45,110,45,.4); }
    .btn-start-icon { width: 28px; height: 28px; background: rgba(255,255,255,.22); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
    .btn-start-arrow { margin-left: 4px; font-size: 20px; opacity: .8; }

    /* GAME */
    #game { justify-content: flex-start; }
    #game.stage-1 { background: linear-gradient(160deg, #ffe8b0 0%, #ffd580 45%, #ffb347 100%); }
    #game.stage-2 { background: linear-gradient(160deg, #ffd0d0 0%, #ff9999 45%, #ff5555 100%); }
    #game.stage-3 { background: linear-gradient(160deg, #d8d0ff 0%, #a090ff 45%, #6655dd 100%); }
    .game-header { width: 100%; padding: 12px 16px 10px; display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,.22); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); flex-shrink: 0; position: relative; z-index: 10; }
    .stage-badge { font-size: 12px; font-weight: 800; color: #fff; background: rgba(0,0,0,.28); border-radius: 20px; padding: 4px 10px; letter-spacing: .5px; flex-shrink: 0; }
    .progress-wrap { flex: 1; height: 10px; background: rgba(255,255,255,.35); border-radius: 10px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 10px; transition: width .1s linear; }
    #game.stage-1 .progress-fill { background: #e91e8c; }
    #game.stage-2 .progress-fill { background: #ff3b3b; }
    #game.stage-3 .progress-fill { background: #a78bfa; }
    .count-badge { font-size: 14px; font-weight: 700; color: rgba(0,0,0,.5); min-width: 22px; text-align: right; flex-shrink: 0; }
    .game-stage { flex: 1; width: 100%; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .stage-label-big { position: absolute; top: 14px; left: 50%; transform: translateX(-50%); font-size: 13px; font-weight: 700; color: rgba(0,0,0,.3); white-space: nowrap; pointer-events: none; z-index: 2; letter-spacing: 1px; }
    #center-guide { position: absolute; top: 0; bottom: 0; width: 2px; background: rgba(255,255,255,.35); left: 50%; transform: translateX(-50%); pointer-events: none; z-index: 2; }
    .guide-dot { position: absolute; left: 50%; top: 50%; width: 14px; height: 14px; border-radius: 50%; background: rgba(255,255,255,.9); border: 2.5px solid #e91e8c; transform: translate(-50%,-50%); pointer-events: none; z-index: 3; }
    #melon-wrap { position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%); pointer-events: none; z-index: 2; }
    .melon-svg { width: clamp(170px,50vw,210px); height: clamp(170px,50vw,210px); }
    #blade { position: absolute; top: 0; bottom: 0; width: 6px; background: repeating-linear-gradient(#fff 0px,#fff 14px,transparent 14px,transparent 22px); border-radius: 3px; box-shadow: 0 0 0 2px #e91e8c; transform: translateX(-50%); will-change: left; z-index: 5; pointer-events: none; transition: box-shadow .08s; }
    #blade.hit-zone { box-shadow: 0 0 0 3px #fff, 0 0 0 5px #e91e8c; }
    #game.stage-2 #blade { box-shadow: 0 0 0 2px #ff3b3b; }
    #game.stage-2 #blade.hit-zone { box-shadow: 0 0 0 3px #fff, 0 0 0 5px #ff3b3b; }
    #game.stage-3 #blade { box-shadow: 0 0 0 2px #a78bfa; }
    #game.stage-3 #blade.hit-zone { box-shadow: 0 0 0 3px #fff, 0 0 0 5px #a78bfa; }
    .tooltip-bubble { position: absolute; background: #fff; border-radius: 16px; padding: 8px 14px; box-shadow: 0 2px 12px rgba(0,0,0,.14); pointer-events: none; z-index: 20; white-space: nowrap; transition: opacity .4s; }
    .tooltip-bubble .big { font-size: 16px; font-weight: 800; color: #e91e8c; display: block; }
    .tooltip-bubble .small { font-size: 11px; color: #666; }
    #tip-right { top: 20%; right: 8%; }
    #tip-left  { top: 58%; left: 4%; }
    #btn-cut { width: calc(100% - 32px); margin: 0 16px 16px; flex-shrink: 0; color: #fff; font-family: inherit; font-size: clamp(20px,5.5vw,24px); font-weight: 800; border: none; border-radius: 50px; padding: 14px 0; cursor: pointer; letter-spacing: 2px; -webkit-tap-highlight-color: transparent; transition: transform .1s, box-shadow .1s; }
    #game.stage-1 #btn-cut { background: linear-gradient(135deg,#38a838 0%,#2d6e2d 100%); box-shadow: 0 5px 20px rgba(45,110,45,.5); }
    #game.stage-2 #btn-cut { background: linear-gradient(135deg,#ff5555 0%,#cc2222 100%); box-shadow: 0 5px 20px rgba(200,30,30,.5); }
    #game.stage-3 #btn-cut { background: linear-gradient(135deg,#8b5cf6 0%,#5b21b6 100%); box-shadow: 0 5px 20px rgba(91,33,182,.5); }
    #btn-cut:active { transform: scale(.97); box-shadow: 0 2px 8px rgba(0,0,0,.3); }

    /* Stage transition */
    #stage-transition { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,.72); z-index: 90; opacity: 0; pointer-events: none; transition: opacity .3s; }
    #stage-transition.show { opacity: 1; pointer-events: all; }
    .trans-icon  { font-size: 56px; margin-bottom: 10px; }
    .trans-stage { font-size: 13px; font-weight: 700; color: rgba(255,255,255,.6); letter-spacing: 3px; margin-bottom: 6px; }
    .trans-title { font-size: 32px; font-weight: 900; color: #fff; margin-bottom: 6px; }
    .trans-desc  { font-size: 14px; color: rgba(255,255,255,.7); margin-bottom: 28px; text-align: center; line-height: 1.5; }
    .btn-next-stage { background: #fff; color: #111; border: none; border-radius: 50px; font-family: inherit; font-size: 17px; font-weight: 800; padding: 13px 44px; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: transform .1s; }
    .btn-next-stage:active { transform: scale(.96); }

    /* Popup */
    #popup-overlay { position: absolute; inset: 0; background: rgba(0,0,0,.6); display: flex; align-items: center; justify-content: center; z-index: 100; opacity: 0; pointer-events: none; transition: opacity .28s; }
    #popup-overlay.show { opacity: 1; pointer-events: all; }
    .popup-card { background: #fff; border-radius: 28px; padding: 32px 24px 24px; width: 84%; max-width: 310px; text-align: center; transform: scale(.82) translateY(16px); transition: transform .28s cubic-bezier(.34,1.5,.64,1); }
    #popup-overlay.show .popup-card { transform: scale(1) translateY(0); }
    .popup-emoji { font-size: 60px; margin-bottom: 10px; line-height: 1; }
    .popup-title { font-size: 26px; font-weight: 900; margin-bottom: 10px; }
    .popup-title.success { color: #2d7a2d; }
    .popup-title.fail    { color: #c0392b; }
    .popup-title.clear   { color: #7c3aed; }
    .popup-desc { font-size: 14px; color: #555; line-height: 1.65; margin-bottom: 24px; white-space: pre-line; }
    .popup-clear-stars { font-size: 28px; margin-bottom: 6px; letter-spacing: 4px; }
    .popup-clear-badge { display: inline-block; background: linear-gradient(135deg,#7c3aed,#c026d3); color: #fff; font-size: 12px; font-weight: 800; letter-spacing: 2px; padding: 5px 16px; border-radius: 50px; margin-bottom: 14px; }
    .popup-btns { display: flex; gap: 10px; }
    .popup-btn { flex: 1; padding: 12px 0; border-radius: 50px; font-family: inherit; font-size: 15px; font-weight: 700; border: none; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: transform .1s; }
    .popup-btn:active { transform: scale(.96); }
    .popup-btn.primary   { background: #2d6e2d; color: #fff; }
    .popup-btn.secondary { background: #f0f0f0; color: #444; }
    .popup-btn.purple    { background: linear-gradient(135deg,#7c3aed,#c026d3); color: #fff; }
  </style>
</head>
<body>
<div id="game-root">

  <!-- INTRO -->
  <div class="screen" id="intro">
    <div class="intro-deco">
      <svg class="deco-melon tl" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><circle cx="100" cy="100" r="90" fill="#2d6e2d"/><g stroke="#1a4d1a" stroke-width="2" fill="none" opacity=".6"><line x1="100" y1="10" x2="100" y2="190"/><line x1="10" y1="100" x2="190" y2="100"/><path d="M100 10 Q140 55 135 100 Q140 145 100 190"/><path d="M100 10 Q60 55 65 100 Q60 145 100 190"/></g></svg>
      <svg class="deco-melon br" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><circle cx="100" cy="100" r="90" fill="#2d6e2d"/><g stroke="#1a4d1a" stroke-width="2" fill="none" opacity=".6"><line x1="100" y1="10" x2="100" y2="190"/><line x1="10" y1="100" x2="190" y2="100"/></g></svg>
      <svg class="deco-melon tr" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><circle cx="100" cy="100" r="90" fill="#2d6e2d"/><g stroke="#1a4d1a" stroke-width="2" fill="none" opacity=".6"><line x1="100" y1="10" x2="100" y2="190"/><path d="M100 10 Q140 55 135 100 Q140 145 100 190"/></g></svg>
    </div>
    <div class="intro-title">
      <span class="melon-icon">&#127816;</span>
      <span class="line1">멜론 자르기</span>
    </div>
    <div class="btn-start-wrap">
      <button class="btn-start" id="btn-intro-start">
        <span class="btn-start-icon">&#127816;</span>
        게임 시작하기
        <span class="btn-start-arrow">&#8250;</span>
      </button>
    </div>
  </div>

  <!-- GAME -->
  <div class="screen hidden stage-1" id="game">
    <div class="game-header">
      <span class="stage-badge" id="stage-badge">STAGE 1</span>
      <div class="progress-wrap"><div class="progress-fill" id="pb"></div></div>
      <span class="count-badge" id="count-text">10</span>
    </div>
    <div class="game-stage" id="stage">
      <div class="stage-label-big" id="stage-label-big">STAGE 1 · EASY</div>
      <div id="center-guide"></div>
      <div class="guide-dot"></div>
      <div id="melon-wrap">
        <svg class="melon-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <defs>
            <radialGradient id="mg" cx="40%" cy="35%">
              <stop offset="0%"   stop-color="#d4edaa"/>
              <stop offset="70%"  stop-color="#8bc34a"/>
              <stop offset="100%" stop-color="#558b2f"/>
            </radialGradient>
            <clipPath id="melon-clip"><circle cx="100" cy="108" r="80"/></clipPath>
          </defs>
          <circle cx="100" cy="108" r="80" fill="url(#mg)"/>
          <g clip-path="url(#melon-clip)" opacity=".55" stroke="#6a9e2a" stroke-width="1.2" fill="none">
            <path d="M30 60 Q100 40 170 60 Q185 108 170 156 Q100 176 30 156 Q15 108 30 60Z"/>
            <line x1="100" y1="28" x2="100" y2="188"/>
            <line x1="20"  y1="108" x2="180" y2="108"/>
            <path d="M100 28 Q135 68 130 108 Q135 148 100 188"/>
            <path d="M100 28 Q65  68 70  108 Q65  148 100 188"/>
            <path d="M48 42  Q108 70 152 42"/>
            <path d="M38 74  Q100 98 162 74"/>
            <path d="M33 140 Q100 118 167 140"/>
            <path d="M46 170 Q100 148 154 170"/>
          </g>
          <path d="M95 28 Q100 10 108 22" stroke="#4caf50" stroke-width="4" fill="none" stroke-linecap="round"/>
          <ellipse cx="100" cy="28" rx="6" ry="5" fill="#4caf50"/>
          <ellipse cx="75" cy="72" rx="16" ry="10" fill="rgba(255,255,255,.22)" transform="rotate(-20 75 72)"/>
        </svg>
      </div>
      <div id="blade" role="presentation"></div>
      <div class="tooltip-bubble" id="tip-right"><span class="big">바로 여기!</span><span class="small">겹쳐지는 순간을 노려요!</span></div>
      <div class="tooltip-bubble" id="tip-left"><span class="big">좌우로 이동</span><span class="small">가운데를 맞춰보세요!</span></div>
    </div>
    <button id="btn-cut">자르기</button>
    <div id="stage-transition">
      <div class="trans-icon"  id="trans-icon">&#9989;</div>
      <div class="trans-stage" id="trans-stage-label">STAGE 1 CLEAR</div>
      <div class="trans-title" id="trans-title">성공!</div>
      <div class="trans-desc"  id="trans-desc">다음 단계는 더 빠릅니다!</div>
      <button class="btn-next-stage" id="btn-next">다음 단계 →</button>
    </div>
  </div>

  <!-- POPUP -->
  <div id="popup-overlay" role="dialog" aria-modal="true" aria-labelledby="pop-title">
    <div class="popup-card" id="popup-card">
      <div class="popup-emoji" id="pop-emoji" aria-hidden="true"></div>
      <div class="popup-title" id="pop-title"></div>
      <p  class="popup-desc"   id="pop-desc"></p>
      <div class="popup-btns">
        <button class="popup-btn secondary" id="pop-back">처음으로</button>
        <button class="popup-btn primary"   id="pop-retry">다시 하기</button>
      </div>
    </div>
  </div>

</div>
<script>
'use strict';
const $ = id => document.getElementById(id);
const introScreen = $('intro'), gameScreen = $('game');
const blade = $('blade'), pb = $('pb'), countText = $('count-text');
const overlay = $('popup-overlay'), stageTrans = $('stage-transition');
const tipRight = $('tip-right'), tipLeft = $('tip-left');

const STAGES = [
  { num:1, label:'STAGE 1 · EASY',    badge:'STAGE 1', baseSpeed:0.44 },
  { num:2, label:'STAGE 2 · HARD',    badge:'STAGE 2', baseSpeed:0.82 },
  { num:3, label:'STAGE 3 · EXTREME', badge:'STAGE 3', baseSpeed:1.28 },
];
const TOTAL_TIME=10000, TICK=80, HIT_RANGE=7.5, CENTER=50, BLADE_MIN=8, BLADE_MAX=92;

let bladeX=BLADE_MIN, dir=1, speed=0.44;
let raf=null, timer=null, elapsed=0, gameActive=false, tipsHidden=false, currentStage=0;

function showScreen(el) { [introScreen,gameScreen].forEach(s=>s.classList.add('hidden')); el.classList.remove('hidden'); }
function setStageClass(i) { gameScreen.classList.remove('stage-1','stage-2','stage-3'); gameScreen.classList.add('stage-'+(i+1)); }

function startGame() { currentStage=0; showScreen(gameScreen); runStage(0); }

function runStage(idx) {
  const cfg = STAGES[idx]; currentStage=idx;
  setStageClass(idx);
  $('stage-badge').textContent = cfg.badge;
  $('stage-label-big').textContent = cfg.label;
  bladeX=BLADE_MIN; dir=1; speed=cfg.baseSpeed+Math.random()*0.12;
  elapsed=0; gameActive=true; tipsHidden=(idx>0);
  tipRight.style.opacity = idx===0?'1':'0';
  tipLeft.style.opacity  = idx===0?'1':'0';
  pb.style.width='100%'; countText.textContent=Math.ceil(TOTAL_TIME/1000);
  blade.style.left=bladeX+'%'; blade.classList.remove('hit-zone');
  stageTrans.classList.remove('show');
  startProgress();
  if(raf) cancelAnimationFrame(raf);
  raf=requestAnimationFrame(animBlade);
}

function animBlade() {
  if(!gameActive) return;
  bladeX+=dir*speed;
  if(bladeX>=BLADE_MAX){bladeX=BLADE_MAX;dir=-1;}
  if(bladeX<=BLADE_MIN){bladeX=BLADE_MIN;dir=1;}
  blade.style.left=bladeX+'%';
  blade.classList.toggle('hit-zone',Math.abs(bladeX-CENTER)<=HIT_RANGE);
  if(!tipsHidden&&elapsed>2500){tipRight.style.opacity='0';tipLeft.style.opacity='0';tipsHidden=true;}
  raf=requestAnimationFrame(animBlade);
}

function startProgress() {
  clearInterval(timer);
  timer=setInterval(()=>{
    elapsed+=TICK;
    const left=Math.max(0,TOTAL_TIME-elapsed);
    pb.style.width=((left/TOTAL_TIME)*100)+'%';
    countText.textContent=Math.ceil(left/1000);
    if(elapsed>=TOTAL_TIME){clearInterval(timer);endRound(false,'timeout');}
  },TICK);
}

function endRound(success, reason) {
  gameActive=false; cancelAnimationFrame(raf); raf=null; clearInterval(timer);
  const dist=Math.abs(bladeX-CENTER), stageNum=currentStage+1;
  if(success) {
    const isFinal=(currentStage===STAGES.length-1);
    if(isFinal) { showMissionClear(dist); }
    else {
      const nextNum=stageNum+1;
      $('trans-icon').textContent='✅';
      $('trans-stage-label').textContent='STAGE '+stageNum+' CLEAR!';
      $('trans-title').textContent=dist<=3?'퍼펙트!':'성공!';
      $('trans-desc').textContent='STAGE '+nextNum+' 시작!\n속도가 훨씬 빨라집니다. 집중!';
      $('btn-next').textContent='STAGE '+nextNum+' 시작 →';
      stageTrans.classList.add('show');
    }
  } else {
    const card=$('popup-card');
    card.innerHTML=
      '<div class="popup-emoji" aria-hidden="true">'+(reason==='timeout'?'⏰':'😢')+'</div>'+
      '<div class="popup-title fail">'+(reason==='timeout'?'시간 초과!':'실패!')+'</div>'+
      '<p class="popup-desc">'+(reason==='timeout'
        ?'STAGE '+stageNum+'\n10초 안에 자르지 못했어요.\n다시 도전해보세요!'
        :'STAGE '+stageNum+' 실패\n중앙에서 '+dist.toFixed(1)+'% 벗어났어요.\n정중앙을 노려보세요!')+'</p>'+
      '<div class="popup-btns">'+
        '<button class="popup-btn secondary" id="pop-back">처음으로</button>'+
        '<button class="popup-btn primary"   id="pop-retry">다시 하기</button>'+
      '</div>';
    bindPopupBtns();
    overlay.classList.add('show');
  }
}

function showMissionClear(dist) {
  const card=$('popup-card');
  card.innerHTML=
    '<div class="popup-clear-stars">⭐⭐⭐</div>'+
    '<div class="popup-clear-badge">MISSION COMPLETE</div>'+
    '<div class="popup-emoji" aria-hidden="true">🏆</div>'+
    '<div class="popup-title clear">미션 클리어!</div>'+
    '<p class="popup-desc">3단계를 모두 완료했어요!\n마지막 정확도: 중앙에서 '+dist.toFixed(1)+'% 차이\n\n정말 대단한 실력이에요! 🎉</p>'+
    '<div class="popup-btns">'+
      '<button class="popup-btn secondary" id="pop-back">처음으로</button>'+
      '<button class="popup-btn purple"    id="pop-retry">다시 도전</button>'+
    '</div>';
  bindPopupBtns();
  overlay.classList.add('show');
}

function cut() { if(!gameActive) return; const d=Math.abs(bladeX-CENTER); endRound(d<=HIT_RANGE,'cut'); }

function addBtn(id,fn) { const el=$(id); if(!el) return; el.addEventListener('click',fn); el.addEventListener('touchend',e=>{e.preventDefault();fn();}); }

function bindPopupBtns() {
  addBtn('pop-retry',()=>{overlay.classList.remove('show');startGame();});
  addBtn('pop-back', ()=>{overlay.classList.remove('show');showScreen(introScreen);});
}

addBtn('btn-intro-start',startGame);
addBtn('btn-cut',cut);
addBtn('btn-next',()=>runStage(currentStage+1));

const stageEl=$('stage');
stageEl.addEventListener('click',cut);
stageEl.addEventListener('touchend',e=>{e.preventDefault();cut();});

document.addEventListener('keydown',e=>{ if((e.code==='Space'||e.code==='Enter')&&gameActive){e.preventDefault();cut();} });
</script>
</body>
</html>
